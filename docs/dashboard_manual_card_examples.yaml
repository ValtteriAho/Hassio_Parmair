# 4) Screenshot-style overview (single Manual card)
# --------------------------------------------------
# Paste this full block into Add card -> Manual.
---
type: vertical-stack
cards:
  - type: markdown
    content: |
      ## Parmair MAC

  - type: gauge
    entity: sensor.parmair_mac_current_speed
    name: Current Speed
    min: 0
    max: 6
    severity:
      green: 1
      yellow: 3
      red: 5

  - type: grid
    columns: 3
    square: false
    cards:
      - type: gauge
        entity: sensor.parmair_mac_exhaust_fan_speed
        name: Exhaust Fan
        min: 0
        max: 100
        severity:
          green: 25
          yellow: 60
          red: 85
      - type: gauge
        entity: sensor.parmair_mac_supply_fan_speed
        name: Supply Fan
        min: 0
        max: 100
        severity:
          green: 25
          yellow: 60
          red: 85
      - type: gauge
        entity: sensor.parmair_mac_post_heater_output
        name: Post-heater
        min: 0
        max: 100
        severity:
          green: 5
          yellow: 35
          red: 70

  - type: grid
    columns: 3
    square: false
    cards:
      - type: gauge
        entity: sensor.parmair_mac_lto_heat_recovery_control
        name: LTO Control
        min: 0
        max: 100
        severity:
          green: 25
          yellow: 60
          red: 85
      - type: sensor
        entity: sensor.parmair_mac_humidity_24h_average
        name: Humidity 24h Avg
        graph: line
        detail: 2
      - type: sensor
        entity: sensor.parmair_mac_humidity
        name: Humidity
        graph: line
        detail: 2

  - type: grid
    columns: 3
    square: false
    cards:
      - type: sensor
        entity: sensor.parmair_mac_supply_air_temperature
        name: Supply Air
        graph: line
        detail: 2
      - type: sensor
        entity: sensor.parmair_mac_exhaust_air_temperature
        name: Exhaust Air
        graph: line
        detail: 2
      - type: sensor
        entity: sensor.parmair_mac_supply_air_temperature_after_recovery
        name: After Recovery
        graph: line
        detail: 2

  - type: grid
    columns: 3
    square: false
    cards:
      - type: sensor
        entity: sensor.parmair_mac_waste_air_temperature
        name: Waste Air
        graph: line
        detail: 2
      - type: sensor
        entity: sensor.parmair_mac_fresh_air_temperature
        name: Fresh Air
        graph: line
        detail: 2
      - type: gauge
        entity: sensor.parmair_mac_heat_recovery_efficiency
        name: Recovery Efficiency
        min: 0
        max: 100
        severity:
          green: 45
          yellow: 30
          red: 15

  - type: grid
    columns: 3
    square: false
    cards:
      - type: tile
        entity: switch.parmair_mac_overpressure_mode
        name: Fireplace Mode
      - type: tile
        entity: switch.parmair_mac_boost_mode
        name: Boost Mode
      - type: tile
        entity: switch.parmair_mac_post_heater
        name: Post Heater

# 5) IV inside picture overlay (single Manual card)
# --------------------------------------------------
# This variant uses an image uploaded to Home Assistant media source.
